<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ToDo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <style>
    body {
      padding-top: 50px;
    }
    .completed .item-text {
      text-decoration: line-through;
      opacity: 0.65;
    }
    #message {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="row">
      <div class="col mx-auto col-md-8 mt-3 text-center">
        <div class="alert" id="message" role="alert"></div>

        <form id="itemForm">
          <h3>To Do List</h3>
          <div class="input-group mb-3">
            <input
              type="text"
              id="itemInput"
              class="form-control"
              placeholder="Add a new item"
            />
            <button type="submit" class="btn btn-outline-primary">Add Item</button>
          </div>
        </form>

        <ul class="nav nav-tabs mb-3 justify-content-center" id="filters">
          <li class="nav-item" data-type="all">
            <a class="nav-link active" href="#">All</a>
          </li>
          <li class="nav-item" data-type="todo">
            <a class="nav-link" href="#">ToDo</a>
          </li>
          <li class="nav-item" data-type="done">
            <a class="nav-link" href="#">Completed</a>
          </li>
        </ul>

        <ul class="list-group text-start" id="todoList"></ul>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script>
    const itemForm = document.getElementById('itemForm');
    const itemInput = document.getElementById('itemInput');
    const todoList = document.getElementById('todoList');
    const message = document.getElementById('message');
    const filterTabs = document.querySelectorAll('#filters .nav-item');

    let items = [];
    let currentFilter = 'all';

    function showMessage(text, type = 'success') {
      message.textContent = text;
      message.className = `alert alert-${type}`;
      message.style.display = 'block';

      setTimeout(() => {
        message.style.display = 'none';
      }, 2000);
    }

    function renderItems() {
      todoList.innerHTML = '';

      const filteredItems = items.filter(item => {
        if (currentFilter === 'todo') return !item.done;
        if (currentFilter === 'done') return item.done;
        return true;
      });

      if (filteredItems.length === 0) {
        todoList.innerHTML = `
          <li class="list-group-item text-center text-muted">
            No items to display
          </li>
        `;
        return;
      }

      filteredItems.forEach(item => {
        const li = document.createElement('li');
        li.className = `list-group-item d-flex justify-content-between align-items-center ${item.done ? 'completed' : ''}`;

        li.innerHTML = `
          <span class="item-text">${item.text}</span>
          <div>
            <button class="btn btn-sm btn-outline-success me-2 toggle-btn" data-id="${item.id}">
              <i class="bi ${item.done ? 'bi-arrow-counterclockwise' : 'bi-check-lg'}"></i>
            </button>
            <button class="btn btn-sm btn-outline-danger delete-btn" data-id="${item.id}">
              <i class="bi bi-trash"></i>
            </button>
          </div>
        `;

        todoList.appendChild(li);
      });
    }

    itemForm.addEventListener('submit', function (e) {
      e.preventDefault();

      const text = itemInput.value.trim();
      if (!text) {
        showMessage('Please enter a todo item.', 'danger');
        return;
      }

      items.push({
        id: Date.now(),
        text,
        done: false
      });

      itemInput.value = '';
      renderItems();
      showMessage('Item added.');
    });

    todoList.addEventListener('click', function (e) {
      const toggleBtn = e.target.closest('.toggle-btn');
      const deleteBtn = e.target.closest('.delete-btn');

      if (toggleBtn) {
        const id = Number(toggleBtn.dataset.id);
        items = items.map(item =>
          item.id === id ? { ...item, done: !item.done } : item
        );
        renderItems();
      }

      if (deleteBtn) {
        const id = Number(deleteBtn.dataset.id);
        items = items.filter(item => item.id !== id);
        renderItems();
        showMessage('Item deleted.', 'warning');
      }
    });

    filterTabs.forEach(tab => {
      tab.addEventListener('click', function (e) {
        e.preventDefault();

        filterTabs.forEach(t => t.querySelector('.nav-link').classList.remove('active'));
        this.querySelector('.nav-link').classList.add('active');

        currentFilter = this.dataset.type;
        renderItems();
      });
    });

    renderItems();
  </script>
</body>
</html>
